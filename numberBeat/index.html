<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Number Battle Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game">
      <h1>Number Battle ⚔️</h1>

      <div class="players">
        <div class="player player--0 active">
          <h2 id="name--0">Player 1</h2>
          <div id="score--0" class="score">0</div>
          <div id="current--0" class="current">Current: 0</div>
        </div>

        <div class="player player--1">
          <h2 id="name--1">Player 2</h2>
          <div id="score--1" class="score">0</div>
          <div id="current--1" class="current">Current: 0</div>
        </div>
      </div>

      <div class="number-box" id="number">?</div>

      <div class="buttons">
        <button class="btn--generate">Generate</button>
        <button class="btn--hold">Hold</button>
        <button class="btn--new">New Game</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
